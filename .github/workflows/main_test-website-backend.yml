name: Build and deploy Node.js app to Azure Web App - Test-Website-Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Add this section here
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
            
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9978D915C5F247698BA7614BF9AF0EC7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EBBC01F6EAC840DA800921E32C130CCF }}          
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0FA6688C494744BA9F19CC87700C3810 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Test-Website-Backend'
          slot-name: 'Production'
          package: .
